# =====================================================================
# NOVA_CORP - FortiGate VM 7.6.7
# Rôle : passerelle Internet sécurisée (LAN -> WAN)
# Config nettoyée pour publication - IP/licence/secrets en placeholders
#
# Contrainte : licence invalide -> limite dure de 3 policies / 3 interfaces
# / 3 routes. Les 6 besoins de sécurité initiaux ont été condensés en
# 3 politiques via des groupes d'adresses + le deny-all implicite.
# =====================================================================

# --- Interfaces ---
config system interface
    edit "port1"
        set alias "WAN"
        set mode dhcp
        set allowaccess ping
    next
    edit "port2"
        set alias "LAN-vers-R1"
        set ip 10.0.0.1 255.255.255.252
        set allowaccess ping ssh
    next
    edit "port3"
        set alias "MGMT"
        set ip 192.168.40.253 255.255.255.0
        set allowaccess ping https ssh
    next
end

# --- Objets adresse ---
config firewall address
    edit "NET-USERS"
        set subnet 192.168.10.0 255.255.255.0
    next
    edit "NET-SERVERS"
        set subnet 192.168.20.0 255.255.255.0
    next
    edit "NET-GUESTS"
        set subnet 192.168.50.0 255.255.255.0
    next
    edit "HOST-R1"
        set subnet 10.0.0.2 255.255.255.255
    next
end

# --- Groupe d'adresses (source de la règle LAN-to-Internet) ---
config firewall addrgrp
    edit "GRP-INTERNET-ALLOWED"
        set member "NET-USERS" "NET-SERVERS" "HOST-R1"
    next
end

# --- Service personnalisé syslog ---
config firewall service custom
    edit "SYSLOG"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 514
        set udp-portrange 514
    next
end

# --- Route par défaut vers Internet ---
config router static
    edit 1
        set gateway <WAN_GATEWAY_IP>
        set device "port1"
    next
end

# =====================================================================
# Politiques (3 max)
# =====================================================================
config firewall policy
    # 1 - LAN vers Internet (Users + Servers + R1)
    edit 1
        set name "LAN-to-Internet"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "GRP-INTERNET-ALLOWED"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS" "NTP" "SYSLOG"
        set logtraffic all
        set nat enable
    next
    # 2 - Invités vers Internet (services restreints)
    edit 2
        set name "GUESTS-to-Internet"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "NET-GUESTS"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set logtraffic all
        set nat enable
    next
    # 3 - emplacement libre (l'isolation des invités repose sur le
    #     deny-all implicite du FortiGate)
end
