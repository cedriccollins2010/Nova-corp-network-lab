! =====================================================================
! NOVA_CORP - Switch L3 (Cisco IOSvL2)
! Rôle : commutation, 5 VLANs, trunk dot1Q vers R1, ACL invités
! Config nettoyée pour publication - secrets remplacés par des placeholders
! =====================================================================

hostname SW-L3
!
enable secret <ENABLE_SECRET>
username admin privilege 15 secret <ADMIN_SECRET>
ip domain-name novaenterprise.com
ip ssh version 2
!
! =====================================================================
! Déclaration des VLANs
! =====================================================================
vlan 10
 name Users
vlan 20
 name Servers
vlan 30
 name Management
vlan 40
 name DMZ
vlan 50
 name Guests
!
! =====================================================================
! Trunk vers R1 (porte tous les VLANs)
! =====================================================================
interface GigabitEthernet0/0
 description Trunk vers R1 Fa0/0
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,40,50
 no shutdown
!
! =====================================================================
! Exemples de ports d'accès (un par VLAN)
! =====================================================================
interface GigabitEthernet0/1
 description Poste Users
 switchport mode access
 switchport access vlan 10
!
interface GigabitEthernet0/2
 description Serveur
 switchport mode access
 switchport access vlan 20
!
interface GigabitEthernet0/3
 description Poste invité
 switchport mode access
 switchport access vlan 50
!
! =====================================================================
! ACL invités : bloque l'accès des invités aux réseaux internes,
! autorise le reste (sortie Internet gérée en aval par R1/FortiGate)
! =====================================================================
ip access-list extended GUESTS-ISOLATION
 deny   ip 192.168.50.0 0.0.0.255 192.168.10.0 0.0.0.255
 deny   ip 192.168.50.0 0.0.0.255 192.168.20.0 0.0.0.255
 deny   ip 192.168.50.0 0.0.0.255 192.168.30.0 0.0.0.255
 deny   ip 192.168.50.0 0.0.0.255 192.168.40.0 0.0.0.255
 permit ip any any
!
! --- SNMP ---
snmp-server community <SNMP_COMMUNITY_RO> RO
snmp-server location NOVA_CORP-Lab
!
line vty 0 4
 transport input ssh
 login local
!
end
