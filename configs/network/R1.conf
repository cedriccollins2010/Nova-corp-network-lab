! =====================================================================
! NOVA_CORP - Routeur R1 (Cisco IOSv)
! Rôle : routage inter-VLAN + lien /30 vers le FortiGate
! Config nettoyée pour publication - secrets remplacés par des placeholders
! =====================================================================

hostname R1
!
! --- Authentification (placeholders) ---
enable secret <ENABLE_SECRET>
username admin privilege 15 secret <ADMIN_SECRET>
!
ip domain-name novaenterprise.com
!
! --- Clés SSH : à régénérer localement (crypto key generate rsa) ---
! crypto key generate rsa modulus 2048
ip ssh version 2
!
! =====================================================================
! Sous-interfaces dot1Q - passerelle .254 de chaque VLAN
! =====================================================================
interface FastEthernet0/0
 no ip address
 no shutdown
!
interface FastEthernet0/0.10
 description VLAN 10 - Users
 encapsulation dot1Q 10
 ip address 192.168.10.254 255.255.255.0
!
interface FastEthernet0/0.20
 description VLAN 20 - Servers
 encapsulation dot1Q 20
 ip address 192.168.20.254 255.255.255.0
!
interface FastEthernet0/0.30
 description VLAN 30 - Management
 encapsulation dot1Q 30
 ip address 192.168.30.254 255.255.255.0
!
interface FastEthernet0/0.40
 description VLAN 40 - DMZ
 encapsulation dot1Q 40
 ip address 192.168.40.254 255.255.255.0
!
interface FastEthernet0/0.50
 description VLAN 50 - Guests
 encapsulation dot1Q 50
 ip address 192.168.50.254 255.255.255.0
!
! =====================================================================
! Lien WAN vers le FortiGate (point-à-point /30)
! =====================================================================
interface GigabitEthernet2/0
 description Lien vers FortiGate port2
 ip address 10.0.0.2 255.255.255.252
 no shutdown
!
! Route par défaut vers le FortiGate
ip route 0.0.0.0 0.0.0.0 10.0.0.1
!
! =====================================================================
! Services : SSH, NTP (avec correction heure d'été EDT), SNMP, syslog
! =====================================================================
!
! --- NTP : fuseau EST/EDT (Ottawa-Gatineau) ---
clock timezone EST -5
clock summer-time EDT recurring
ntp server <NTP_SERVER_IP>
!
! --- SNMP (community string en placeholder) ---
snmp-server community <SNMP_COMMUNITY_RO> RO
snmp-server location NOVA_CORP-Lab
snmp-server contact admin@novaenterprise.com
!
! --- Syslog vers le SIEM (via FortiGate) ---
logging host 192.168.66.128
logging trap informational
!
! --- Accès distant SSH uniquement ---
line vty 0 4
 transport input ssh
 login local
!
end
